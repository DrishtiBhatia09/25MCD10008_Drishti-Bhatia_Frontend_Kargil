<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime University Campus Navigation System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>🏫 Prime University Campus Navigation System</h1>
      <p>Find the shortest path between campus locations using A* Algorithm</p>
    </div>
  </header>

  <main class="main-container">
    <section class="left-panel">
      <h2>Route Control</h2>

      <div class="control-card">
        <label for="startLocation">Select Start Location</label>
        <select id="startLocation"></select>

        <label for="endLocation">Select Destination</label>
        <select id="endLocation"></select>
      </div>

      <div class="details-card">
        <h3>Route Details</h3>
        <pre id="routeDetails">Choose start and destination,
then click Find Path.</pre>
      </div>

      <button class="find-btn" onclick="findRoute()">Find Path</button>
      <button class="reset-btn" onclick="resetMap()">Reset</button>
    </section>

    <section class="right-panel">
      <div class="map-card">
        <h2>Campus Map</h2>
        <canvas id="mapCanvas" width="900" height="620"></canvas>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
